<!DOCTYPE html>
<html lang="en">
<link rel="manifest" href="manifest.json" />
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Zapping Stream" />
    <meta property="og:description" content="Todo el universo del streaming argentino en vivo" />
    <meta property="og:url" content="https://zappingstream.github.io" />
    <meta property="og:image" content="https://zappingstream.github.io/favicon.png" />
    <title>Zapping Stream</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="ZappingStreamWeb.styles.css" rel="stylesheet" />

    <style>
        body {
            background-color: #000;
        }

        .pantalla-carga {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
        }

        .loading-logo {
            width: 60vw;
            max-width: 280px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(56, 182, 255, 0.4));
            user-drag: none;
            -webkit-user-drag: none;
            will-change: transform, opacity;
        }

        .spinner-loader {
            width: 10px;
            height: 1px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #38B6FF;
            border-radius: 50%;
            animation: giro 1s linear infinite;
            margin-bottom: 20px;
        }

        .loading-row {
            display: flex;
            align-items: center; 
            justify-content: center;
            gap: 15px; 
        }

        .spinner-loader {
            width: 25px; 
            height: 25px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #38B6FF;
            border-radius: 50%;
            animation: giro 1s linear infinite;
        }

        @keyframes giro {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }


    </style>
</head>

<body>
   <div id="app">
        <div class="pantalla-carga">
            <img src="favicon.png" alt="Cargando Zapping Stream" class="loading-logo" />
            
            <div class="loading-row">
                <div class="spinner-loader"></div>
                <!--<div class="texto-loader">Cargando...</div>-->
            </div>
            
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script>
        let isDown = false;
        let startX;
        let scrollLeft;
        let isDragging = false;

        document.addEventListener('mousedown', (e) => {
            const slider = e.target.closest('.channel-row');
            if (!slider) return;

            isDown = true;
            isDragging = false;
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });

        document.addEventListener('mouseleave', (e) => {
            if (!isDown) return;
            const slider = e.target.closest('.channel-row');
            if (slider) isDown = false;
        });

        document.addEventListener('mouseup', (e) => {
            const slider = e.target.closest('.channel-row');
            if (!slider) return;
            isDown = false;

            setTimeout(() => {
                isDragging = false;
            }, 50);
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            const slider = e.target.closest('.channel-row');
            if (!slider) return;

            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 1.5;

            if (Math.abs(walk) > 5) {
                isDragging = true;
            }

            slider.scrollLeft = scrollLeft - walk;
        });

        document.addEventListener('click', (e) => {
            if (isDragging) {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);
    </script>
    <script>
        window.navegarYouTube = (url) => {
            // Detectamos si es una TV (Android TV, Tizen, WebOS) o Móvil
            const esTVoMovil = /Android|webOS|Tizen|iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (esTVoMovil) {
                // En TVs y Celulares, lo mejor es navegar en la misma pestaña.
                // Esto le da la oportunidad al sistema de decir: 
                // "¡Ey! Este link es de YouTube, ¿querés abrirlo con la app?"
                window.location.href = url;
            } else {
                // En la compu, abrimos pestaña nueva para no cerrar tu grilla.
                window.open(url, "_blank");
            }
        };

        window.getSafeFirebaseToken = async () => {
            let intentos = 0;
            while (typeof window.getFirebaseAppCheckToken === 'undefined' && intentos < 50) {
                await new Promise(resolve => setTimeout(resolve, 100));
                intentos++;
            }
            if (typeof window.getFirebaseAppCheckToken !== 'undefined') {
                return await window.getFirebaseAppCheckToken();
            }
            console.error("Firebase no cargó a tiempo.");
            return null;
        };
    </script>

        import { initializeAppCheck, ReCaptchaV3Provider, getToken } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app-check.js";

            apiKey: "AIzaSyAnymUVsnZdWfjRWgh0uLxaVmW4zb6GZWE",
            authDomain: "zappingstreaming.firebaseapp.com",
            databaseURL: "https://zappingstreaming-default-rtdb.firebaseio.com",
            projectId: "zappingstreaming",
            storageBucket: "zappingstreaming.firebasestorage.app",
            messagingSenderId: "593976978663",
            appId: "1:593976978663:web:c57204672e0ed0a5708642",
            measurementId: "G-6FGQ48456S"
        };

        const app = initializeApp(firebaseConfig);

        if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
            self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
            console.log("🛠️ Modo App Check Debug activado");
        } else {
            self.FIREBASE_APPCHECK_DEBUG_TOKEN = false;
        }

        window.appCheck = initializeAppCheck(app, {
            provider: new ReCaptchaV3Provider('6LfZT7ssAAAAADaZNAxdBH9qvGJuceUt3Yzwb_hz'),
            isTokenAutoRefreshEnabled: true
        });

        window.getFirebaseAppCheckToken = async () => {
            try {
                const appCheckTokenResponse = await getToken(window.appCheck, false);
                return appCheckTokenResponse.token;
            } catch (err) {
                console.error("Error obteniendo el token de App Check:", err);
                return null;
            }
        };
    </script>
</body>
</html>
